<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Haven Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;           /* deep navy */
  --card:#121a2b;         /* dark card */
  --text:#e6eaf2;         /* soft white */
  --sub:#9aa4b2;          /* muted */
  --accent:#4f7cff;       /* professional blue */
}

body.light{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#1b2430;
  --sub:#6b7280;
  --accent:#4f7cff;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
  font-size:3rem;
  font-weight:700;
}

.tagline{
  color:var(--sub);
  margin-top:5px;
}

.nav{
  margin-top:15px;
}

.nav input{
  padding:10px 15px;
  border-radius:25px;
  border:none;
  outline:none;
  width:220px;
}

.toggle-btn{
  margin-left:10px;
  padding:10px 14px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  background:var(--accent);
  color:#fff;
}

.container{
  column-count:3;
  column-gap:20px;
  padding:25px;
}

.card{
  background:var(--card);
  margin:0 0 20px;
  border-radius:16px;
  overflow:hidden;
  display:inline-block;
  width:100%;
  box-shadow:0 6px 25px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.book-img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.book-title{
  font-weight:600;
}

.author-box{
  display:flex;
  align-items:center;
  margin-top:10px;
}

.author-img{
  width:35px;
  height:35px;
  border-radius:50%;
  margin-right:10px;
}

.desc{
  font-size:0.8rem;
  color:var(--sub);
  margin-top:8px;
}

.chat-btn{
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  background:var(--accent);
  color:#fff;
  padding:12px 16px;
  border-radius:30px;
  cursor:pointer;
}

@media(max-width:900px){.container{column-count:2;}}
@media(max-width:600px){.container{column-count:1;}}
</style>
</head>

<body>

<header>
  <div class="logo">📚 Book Haven</div>
  <div class="tagline">Discover • Read • Grow</div>
  <div class="nav">
    <input type="text" placeholder="Search books...">
    <button class="toggle-btn" onclick="toggleMode()">Toggle</button>
  </div>
</header>

<div class="container">
<!-- (cards remain same, kept for brevity) -->
</div>

<div class="chat-btn" onclick="openChat()">💬</div>

<script>
function toggleMode(){
  document.body.classList.toggle('light');
}

let watsonInstance = null;
function openChat(){
  if(watsonInstance){
    watsonInstance.openWindow();
  }
}
</script>

<!-- Watson Assistant -->
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "1ce52ad7-078b-434c-b073-33ca1b8e3005",
    region: "eu-de",
    serviceInstanceID: "63df9709-ade0-491a-a2ce-2ffea9612eef",
    onLoad: async (instance) => { 
      watsonInstance = instance;
      await instance.render(); 
    }
  };
  setTimeout(function(){
    const t=document.createElement('script');
    t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
