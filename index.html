<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Haven</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background-color: #0f0f0f;
    color: #fff;
}

header {
    text-align: center;
    padding: 30px;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 2px;
}

.container {
    column-count: 3;
    column-gap: 15px;
    padding: 20px;
}

.card {
    background: #1c1c1c;
    margin: 0 0 15px;
    padding: 15px;
    border-radius: 20px;
    display: inline-block;
    width: 100%;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.book-title {
    font-size: 1.2rem;
    font-weight: 600;
}

.author {
    font-size: 0.9rem;
    color: #aaa;
    margin-top: 5px;
}

@media (max-width: 900px) {
    .container {
        column-count: 2;
    }
}

@media (max-width: 600px) {
    .container {
        column-count: 1;
    }
}
</style>
</head>

<body>

<header>📚 Book Haven</header>

<div class="container">

<div class="card">
    <div class="book-title">Atomic Habits</div>
    <div class="author">James Clear</div>
</div>

<div class="card">
    <div class="book-title">The Alchemist</div>
    <div class="author">Paulo Coelho</div>
</div>

<div class="card">
    <div class="book-title">Rich Dad Poor Dad</div>
    <div class="author">Robert Kiyosaki</div>
</div>

<div class="card">
    <div class="book-title">Ikigai</div>
    <div class="author">Héctor García & Francesc Miralles</div>
</div>

<div class="card">
    <div class="book-title">Think and Grow Rich</div>
    <div class="author">Napoleon Hill</div>
</div>

<div class="card">
    <div class="book-title">Deep Work</div>
    <div class="author">Cal Newport</div>
</div>

<div class="card">
    <div class="book-title">The Psychology of Money</div>
    <div class="author">Morgan Housel</div>
</div>

</div>

<!-- Watson Assistant Chatbot -->
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "1ce52ad7-078b-434c-b073-33ca1b8e3005",
    region: "eu-de",
    serviceInstanceID: "63df9709-ade0-491a-a2ce-2ffea9612eef",
    onLoad: async (instance) => { await instance.render(); }
  };
  setTimeout(function(){
    const t=document.createElement('script');
    t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
