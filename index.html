<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Haven Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffe7cc;
  --card:#ffffff;
  --text:#222;
  --sub:#555;
}

body.dark{
  --bg:#0f0f0f;
  --card:#1c1c1c;
  --text:#fff;
  --sub:#bbb;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1495446815901-a7297e633e8d');
  background-size:cover;
  background-attachment:fixed;
  color:var(--text);
}

header{
  display:flex;
  flex-direction:column;
  text-align:center;
  padding:20px;
  backdrop-filter: blur(10px);
}

.logo{
  font-size:3rem;
  font-weight:700;
}

.nav{
  margin-top:15px;
}

.nav input{
  padding:8px 12px;
  border-radius:20px;
  border:none;
}

.toggle-btn{
  margin-left:10px;
  padding:8px 12px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.container{
  column-count:3;
  column-gap:18px;
  padding:20px;
}

.card{
  background:var(--card);
  margin:0 0 18px;
  border-radius:18px;
  overflow:hidden;
  display:inline-block;
  width:100%;
  box-shadow:0 5px 25px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px) scale(1.01);
}

.book-img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.book-title{
  font-weight:600;
}

.author-box{
  display:flex;
  align-items:center;
  margin-top:10px;
}

.author-img{
  width:35px;
  height:35px;
  border-radius:50%;
  margin-right:10px;
}

.desc{
  font-size:0.8rem;
  color:var(--sub);
  margin-top:8px;
}

.chat-btn{
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  background:#ff914d;
  color:#fff;
  padding:12px 15px;
  border-radius:30px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

@media(max-width:900px){.container{column-count:2;}}
@media(max-width:600px){.container{column-count:1;}}
</style>
</head>

<body>

<header>
  <div class="logo">📚 Book Haven</div>
  <p style="color:var(--sub);">Discover • Read • Grow</p>
  <div class="nav">
    <input type="text" placeholder="Search books...">
    <button class="toggle-btn" onclick="toggleMode()">🌙</button>
  </div>
</header>

<div class="container">

<div class="card">
  <img class="book-img" src="https://images.unsplash.com/photo-1512820790803-83ca734da794">
  <div class="card-content">
    <div class="book-title">Atomic Habits</div>
    <div class="author-box">
      <img class="author-img" src="https://randomuser.me/api/portraits/men/32.jpg">
      <div>James Clear</div>
    </div>
    <div class="desc">Build good habits and break bad ones effectively.</div>
  </div>
</div>

<div class="card">
  <img class="book-img" src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f">
  <div class="card-content">
    <div class="book-title">The Alchemist</div>
    <div class="author-box">
      <img class="author-img" src="https://randomuser.me/api/portraits/men/45.jpg">
      <div>Paulo Coelho</div>
    </div>
    <div class="desc">A journey of dreams and destiny.</div>
  </div>
</div>

</div>

<div class="chat-btn" onclick="openChat()">💬 Chat</div>

<script>
function toggleMode(){
  document.body.classList.toggle('dark');
}

let watsonInstance = null;

function openChat(){
  if(watsonInstance){
    watsonInstance.openWindow();
  }
}
</script>

<!-- Watson Assistant -->
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "1ce52ad7-078b-434c-b073-33ca1b8e3005",
    region: "eu-de",  // ✅ correct
    serviceInstanceID: "63df9709-ade0-491a-a2ce-2ffea9612eef",
    onLoad: async (instance) => { 
      watsonInstance = instance;
      await instance.render(); 
    }
  };

  setTimeout(function(){
    const t=document.createElement('script');
    t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" 
      + (window.watsonAssistantChatOptions.clientVersion || 'latest') 
      + "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
